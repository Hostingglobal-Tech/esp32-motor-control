<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="'Malgun Gothic','맑은 고딕','Apple SD Gothic Neo',sans-serif">
  <rect width="900" height="560" fill="#ffffff"/>

  <!-- 제목 -->
  <text x="450" y="40" text-anchor="middle" font-size="23" font-weight="700" fill="#1a1a1a">ESP32-S3 + FS90R 서보 1개 — J1 헤더 끝 3핀 직결</text>
  <text x="450" y="66" text-anchor="middle" font-size="13.5" fill="#555">GPIO14 · 5V · GND 연속 배치 — 점퍼선 없이 서보 커넥터를 그대로 꽂는다</text>

  <!-- ===== 배선 3선 (수평 직결) ===== -->
  <line x1="280" y1="380" x2="630" y2="380" stroke="#E8890C" stroke-width="4"/>
  <line x1="280" y1="420" x2="630" y2="420" stroke="#D0322A" stroke-width="4"/>
  <line x1="280" y1="460" x2="630" y2="460" stroke="#5A4632" stroke-width="4"/>

  <!-- ===== ESP32-S3 보드 ===== -->
  <rect x="70" y="130" width="210" height="360" rx="12" fill="#eef1f6" stroke="#333" stroke-width="2"/>
  <text x="175" y="166" text-anchor="middle" font-size="17" font-weight="700" fill="#1a1a1a">ESP32-S3</text>
  <text x="175" y="186" text-anchor="middle" font-size="12" fill="#555">DevKitC-1</text>
  <rect x="147" y="466" width="56" height="18" rx="3" fill="#444"/>
  <text x="175" y="479" text-anchor="middle" font-size="11" fill="#fff">USB-C</text>

  <!-- J1 헤더 강조 박스 -->
  <rect x="186" y="360" width="112" height="120" rx="6" fill="none" stroke="#B36A00" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="242" y="352" text-anchor="middle" font-size="11.5" font-weight="700" fill="#B36A00">J1 헤더 끝 3핀</text>

  <!-- J1 핀 (우변) -->
  <g font-size="14">
    <circle cx="280" cy="300" r="4.5" fill="#bbb"/><text x="266" y="305" text-anchor="end" fill="#999">GPIO12</text>
    <circle cx="280" cy="340" r="4.5" fill="#bbb"/><text x="266" y="345" text-anchor="end" fill="#999">GPIO13</text>
    <circle cx="280" cy="380" r="6" fill="#E8890C"/><text x="266" y="385" text-anchor="end" font-weight="700" fill="#1a1a1a">GPIO14</text>
    <circle cx="280" cy="420" r="6" fill="#D0322A"/><text x="266" y="425" text-anchor="end" font-weight="700" fill="#1a1a1a">5V</text>
    <circle cx="280" cy="460" r="6" fill="#5A4632"/><text x="266" y="465" text-anchor="end" font-weight="700" fill="#1a1a1a">GND</text>
  </g>
  <text x="266" y="270" text-anchor="end" font-size="13" fill="#aaa">⋮</text>

  <!-- ===== 서보 (FS90R) ===== -->
  <rect x="630" y="340" width="170" height="140" rx="8" fill="#f7f7f7" stroke="#333" stroke-width="1.5"/>
  <text x="715" y="370" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1a1a">FS90R 서보</text>
  <g font-size="11.5">
    <circle cx="630" cy="380" r="5" fill="#E8890C"/><text x="644" y="384" fill="#B36A00">S · 신호</text>
    <circle cx="630" cy="420" r="5" fill="#D0322A"/><text x="644" y="424" fill="#A5261F">+ · 5V</text>
    <circle cx="630" cy="460" r="5" fill="#5A4632"/><text x="644" y="464" fill="#5A4632">− · GND</text>
  </g>

  <!-- 범례 -->
  <rect x="632" y="130" width="236" height="96" rx="8" fill="#fafafa" stroke="#ccc" stroke-width="1"/>
  <text x="648" y="152" font-size="13" font-weight="700" fill="#1a1a1a">범례</text>
  <line x1="648" y1="172" x2="680" y2="172" stroke="#E8890C" stroke-width="4"/><text x="690" y="176" font-size="12" fill="#333">신호 → GPIO14 (주황)</text>
  <line x1="648" y1="194" x2="680" y2="194" stroke="#D0322A" stroke-width="4"/><text x="690" y="198" font-size="12" fill="#333">전원 → 5V (빨강)</text>
  <line x1="648" y1="216" x2="680" y2="216" stroke="#5A4632" stroke-width="4"/><text x="690" y="220" font-size="12" fill="#333">접지 → GND (갈색)</text>

  <!-- 방향 주의 -->
  <rect x="70" y="508" width="760" height="40" rx="8" fill="#fff7e6" stroke="#d4a017" stroke-width="1.5"/>
  <text x="90" y="533" font-size="13" fill="#7a5c00">꽂는 방향: 서보 주황(신호)이 GPIO14(위)쪽, 갈색(GND)이 맨 끝. 뒤집어 꽂으면 신호·접지가 바뀌어 서보가 돌지 않는다.</text>
</svg>
